<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Eik & Co oak leaf mark">
  <title>Eik &amp; Co</title>
  <!-- outer circle -->
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="currentColor" stroke-width="1.25"/>
  <!-- oak leaf, single continuous lobed silhouette, drawn around the central stem -->
  <g fill="currentColor">
    <!-- central stem + leaf midrib, very thin -->
    <path d="M31.55 12 L31.55 52 L32.45 52 L32.45 12 Z" opacity="0.9"/>
    <!-- left side lobes -->
    <path d="M32 14
             C 27 17, 22 17, 20 21
             C 18 18, 14 18, 13 22
             C 15 24, 18 25, 21 24
             C 19 27, 16 29, 15 32
             C 18 32, 22 31, 24 28
             C 23 32, 20 35, 19 38
             C 23 37, 27 34, 28 30
             C 28 34, 27 38, 25 42
             C 29 40, 32 36, 32 32
             Z" opacity="0.92"/>
    <!-- right side lobes (mirrored) -->
    <path d="M32 14
             C 37 17, 42 17, 44 21
             C 46 18, 50 18, 51 22
             C 49 24, 46 25, 43 24
             C 45 27, 48 29, 49 32
             C 46 32, 42 31, 40 28
             C 41 32, 44 35, 45 38
             C 41 37, 37 34, 36 30
             C 36 34, 37 38, 39 42
             C 35 40, 32 36, 32 32
             Z" opacity="0.92"/>
    <!-- leaf tip -->
    <path d="M32 46
             C 30 48, 30 50, 32 52
             C 34 50, 34 48, 32 46 Z" opacity="0.9"/>
  </g>
</svg>
