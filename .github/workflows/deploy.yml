name: Deploy theme to SiteGround

# Triggers
# --------
# 1. On push to main — automatically queues a deploy (but it still waits
#    for manual approval because the `production` environment is protected)
# 2. Manual trigger from the Actions tab — lets you optionally dry-run
on:
  push:
    branches: [main]
    paths:
      - 'themes/eikco/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without uploading)'
        type: boolean
        default: false

# Prevent concurrent deploys — if a second push comes in while a deploy
# is running, cancel the older one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload theme via SFTP
    runs-on: ubuntu-latest

    # The `production` environment must be created in GitHub:
    #   Settings → Environments → New environment → "production"
    #   → enable "Required reviewers" and add yourself
    # This means every run pauses until you manually approve it in the UI.
    environment:
      name: production
      url: https://eik.es

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show what would be deployed
        run: |
          echo "Deploying contents of themes/eikco/ to wp-content/themes/eikco/ on ${{ secrets.SFTP_HOST }}"
          echo ""
          echo "Files that would be uploaded:"
          find themes/eikco -type f | sort
          echo ""
          echo "Total file count:"
          find themes/eikco -type f | wc -l

      - name: Deploy via FTPS
        if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: 21
          protocol: ftps
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          # Only upload the theme folder — nothing else in the repo
          local-dir: ./themes/eikco/
          # Remote path on SiteGround. Adjust if your WP install is
          # not at the document root (e.g. in a /public_html/ subfolder).
          server-dir: ${{ secrets.SFTP_REMOTE_PATH }}
          # Safety: never delete files on the server that don't exist
          # locally. We only add/update, never remove.
          dangerous-clean-slate: false
          # Exclude dev files from upload
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/*.map
            **/README.md

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "::notice::Dry run complete. No files were uploaded."
          echo "Re-run without dry_run to actually deploy."
